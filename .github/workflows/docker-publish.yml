name: "Build & Publish Docker Image (CD)"

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build Docker Image
        run: |
          nix build .#dockerImage --impure

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub
        run: |
          # Read version from backend/Cargo.toml
          VERSION=$(grep -m 1 '^version = ' backend/Cargo.toml | cut -d '"' -f 2)
          # Push using skopeo
          skopeo copy docker-archive:result docker://docker.io/ubermetroid/snake:${VERSION}
          skopeo copy docker-archive:result docker://docker.io/ubermetroid/snake:latest
